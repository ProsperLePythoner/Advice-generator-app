<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Advice generator app</title>

</head>

<body>
  
  <div id="loading" class="loading hidden" aria-roledescription="loading indicator">
    <p id="loading-text">Loading...</p>
  </div>

  <main class="main-container">

    <article class="card" aria-live="polite">

      <h1 class="advice-id" id="adviceId">Advice #117</h1>
      <q class="advice" id="adviceText">Loading...</q>
      <img src="./images/pattern-divider-desktop.svg" alt="divider" class="divider">
      <div id="error" class="error hidden">Failed to load. Try again!</div>

      <button class="dice-button" id="diceButton">
        <img src="./images/icon-dice.svg" alt="dice icon">
      </button>
      
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
